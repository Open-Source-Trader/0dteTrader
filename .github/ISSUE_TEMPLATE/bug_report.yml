name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Tap / click …
        3. See error
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which part of the app is affected?
      options:
        - iOS app
        - Desktop app
        - API / backend
        - Setup / tooling
        - Not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5 / Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 18.20.3 (run: node --version)"

  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: "e.g. 26.1.4 (run: docker --version)"

  - type: input
    id: xcode
    attributes:
      label: Xcode version (iOS issues only)
      placeholder: "e.g. 15.4"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am not including any secrets or credentials in this report
          required: true
