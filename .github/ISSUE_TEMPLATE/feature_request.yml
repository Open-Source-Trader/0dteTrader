name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Please describe it clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? Who does it affect?
      placeholder: 'As a trader I find it frustrating when…'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other approaches? Why do you prefer yours?

  - type: dropdown
    id: component
    attributes:
      label: Which part of the app would this affect?
      multiple: true
      options:
        - iOS app
        - Desktop app
        - API / backend
        - Shared types / contracts
        - Documentation
        - Tooling / CI

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar projects, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
