version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    ignore:
      # apps/api must stay on TS 6 until ts-jest supports TS 7
      # (ts-jest peer range is `typescript >=4.3 <7`)
      - dependency-name: typescript
        versions: ['>=7']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 5
