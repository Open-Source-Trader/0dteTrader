name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'  # every Monday at 04:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extend with security-and-quality suite for a financial application
          queries: security-and-quality

      - name: Build (required for CodeQL analysis)
        env:
          DATABASE_URL: postgresql://odtetrader:odtetrader@localhost:5432/odtetrader
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: codeql-access-secret-min-32-characters
          JWT_REFRESH_SECRET: codeql-refresh-secret-min-32-characters
          CRED_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
