services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: odtetrader-api
    ports:
      - '${PORT:-3000}:3000'
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-odtetrader}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-odtetrader}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/v1/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - odtetrader

  postgres:
    image: postgres:16-alpine
    container_name: odtetrader-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odtetrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-odtetrader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-odtetrader}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - odtetrader

  redis:
    image: redis:7-alpine
    container_name: odtetrader-redis-prod
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - odtetrader

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: odtetrader-migrate
    command: npx --workspace apps/api prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-odtetrader}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-odtetrader}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - odtetrader

volumes:
  pgdata:

networks:
  odtetrader:
    driver: bridge
