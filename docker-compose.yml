services:
  postgres:
    image: postgres:16-alpine
    container_name: odtetrader-postgres
    environment:
      POSTGRES_USER: odtetrader
      POSTGRES_PASSWORD: odtetrader
      POSTGRES_DB: odtetrader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odtetrader"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odtetrader-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
