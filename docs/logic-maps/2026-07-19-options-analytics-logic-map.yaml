schema_version: 1
template_id: event_driven_logic_map.v1
title: options-analytics-current-to-target-logic-map
owner: 0dteTrader-engineering
date: '2026-07-19'
status: approved
system: options-analytics
source_plan: docs/plans/2026-07-19-options-analytics-snapshot-suite.yaml
source_spec_sheet: docs/specs/2026-07-19-options-analytics-spec.md
objective:
  restated: Define every state transition needed to replace the inaccurate GEX snapshot with exact, quality-aware options analytics and persisted capture.
required_context_files_read_first:
  - AGENTS.md
  - docs/plans/plan-template.yaml
  - docs/plans/checking_plan_plan-template.yaml
  - docs/specs/2026-07-19-options-analytics-spec.md
scope:
  in_scope: [shared contract, provider normalization, calculation, cache, capture, desktop, iOS]
  out_of_scope:
    [orders, signed trade flow, public history API, future skew and higher-order Greek indicators]
current_logic:
  states: [polling, provider-fetch, assumed-model, misleading-aggregation, unlabeled-render]
  critical_gaps:
    [
      stale Greeks presented fresh,
      silent IV,
      100x gamma unit,
      fixed UTC expiry,
      inconsistent signs,
      wrong terminology,
      wrong-expiration stale fallback,
    ]
event_inputs:
  external_events:
    - {
        name: analytics-request,
        source: desktop-or-ios,
        payload_shape: symbol plus required exact expiration,
      }
    - {
        name: core-capture-tick,
        source: capture-scheduler,
        payload_shape: minute bucket plus core symbols,
      }
    - {
        name: provider-response,
        source: Tradier,
        payload_shape: quote and option-chain fields with timestamps,
      }
  internal_events:
    - {
        name: viewed-capture,
        source: analytics-service,
        payload_shape: successful snapshot and minute bucket,
      }
    - { name: retention-tick, source: capture-scheduler, payload_shape: current clock }
state_model:
  states: [idle, validating, fetching, modeling, partial, complete, persisting, responding, failed]
  initial_state: idle
  terminal_states: [responding, failed]
transitions:
  - id: T1
    from_state: idle
    trigger_event: analytics-request-or-capture-tick
    guard_conditions: [valid normalized symbol, exact expiration resolvable]
    transformations: [construct exact cache and in-flight key]
    to_state: fetching
    outputs: [provider request or shared in-flight promise]
    side_effects: [provider call]
    failure_paths:
      - {
          failure: expiration-not-found,
          handling: return 404 and never substitute,
          resulting_state: failed,
        }
  - id: T2
    from_state: fetching
    trigger_event: provider-response
    guard_conditions: [quote and at least one contract pass observed-field runtime validation]
    transformations:
      [
        open-or-latest-completed-session validation,
        settlement calculation,
        synchronized pairs,
        forward,
        IV solve,
        local Greeks,
      ]
    to_state: modeling
    outputs: [normalized observed contracts with modeled fields where IV is solvable]
    side_effects: [quality counters and warnings]
    failure_paths:
      - {
          failure: provider-throttle-or-timeout,
          handling: use valid exact cache or return 503,
          resulting_state: failed,
        }
      - {
          failure: some-contracts-invalid,
          handling: exclude and continue,
          resulting_state: partial,
        }
      - {
          failure: local-IV-unavailable,
          handling: retain observed fields and set model fields null,
          resulting_state: partial,
        }
  - id: T3
    from_state: modeling
    trigger_event: analyzed-contracts-ready
    guard_conditions: [finite observed values and finite-or-null modeled values only]
    transformations:
      [
        call put gross aggregation,
        optional dealer proxy,
        independent walls,
        dense-grid roots,
        implied range,
        OI value,
        liquidity,
      ]
    to_state: complete
    outputs: [OptionsAnalyticsSnapshot]
    side_effects: [bounded exact-cache update]
    failure_paths:
      - {
          failure: optional-layer-unavailable,
          handling: nullable layer plus warning,
          resulting_state: partial,
        }
  - id: T4
    from_state: complete-or-partial
    trigger_event: capture-requested
    guard_conditions: [snapshot valid, market session open for core capture]
    transformations: [bucket observation minute, serialize normalized inputs and derived output]
    to_state: persisting
    outputs: [unique Prisma create]
    side_effects: [database write and capture metric]
    failure_paths:
      - {
          failure: duplicate-minute-key,
          handling: treat as deduplicated success,
          resulting_state: responding,
        }
      - {
          failure: database-unavailable,
          handling: log and continue interactive response,
          resulting_state: responding,
        }
  - id: T5
    from_state: complete-or-partial
    trigger_event: client-receives-response
    guard_conditions: [request generation symbol and expiration still match]
    transformations: [presentation model and accessible summary]
    to_state: responding
    outputs: [right-edge profile and provenance badge]
    side_effects: [none]
    failure_paths:
      - { failure: obsolete-generation, handling: discard response, resulting_state: idle }
  - id: T6
    from_state: idle
    trigger_event: retention-tick
    guard_conditions: [single cleanup run active]
    transformations: [compact old one-minute rows, delete expired detail and compact rows]
    to_state: idle
    outputs: [compaction and deletion counts]
    side_effects: [database transaction and metrics]
    failure_paths:
      - {
          failure: cleanup-failure,
          handling: log and retry next scheduled tick,
          resulting_state: idle,
        }
actual_event_paths:
  - request -> exact validation -> synchronized fetch -> local model -> complete snapshot -> viewed dedupe insert -> client profile
  - minute tick -> open-session check -> core exact expirations -> staggered calculations -> unique inserts
  - retention tick -> five-minute compaction -> 30-day detail deletion -> one-year compact deletion
all_possible_event_paths:
  - exact cache hit during throttle with visible cached state
  - partial result from excluded contracts with nullable optional layers
  - 404 exact expiration missing
  - 503 no usable contracts or cache
  - late client response discarded by generation key
invariants:
  preconditions:
    [
      exact symbol-expiration identity,
      explicit settlement,
      open-session-fresh or latest-completed-session-close provider values,
    ]
  postconditions:
    [finite output, explicit units and provenance, idempotent minute storage, client parity]
  must_never_happen:
    [
      wrong expiration,
      silent constant IV,
      fabricated layer,
      unbounded cache,
      overlapping poll,
      dealer fact claim,
      history-spanning snapshot bands,
    ]
risk_review:
  user_behavior_breaks: [frequent settings changes and navigation can create obsolete work]
  production_traffic_breaks:
    [four core chains every minute plus viewed symbols can throttle provider]
  weird_data_breaks: [one-sided zero crossed stale or nonstandard contracts]
  concurrency_time_order_breaks: [DST early closes scheduler overlap and database duplicates]
validation:
  tests_required:
    [
      golden math,
      finite differences,
      settlement calendar,
      validation,
      roots,
      cache concurrency,
      persistence lifecycle,
      contract parity,
      polling cancellation,
      accessibility,
    ]
  observability_required:
    [structured warnings, cache state, provider limits, capture counters, cleanup counters]
cleanup_requirements:
  remove_dead_code: true
  remove_backwards_compatibility_paths: true
  update_related_files: [all GEX API and client paths, shared types, Prisma schema, docs and tests]
