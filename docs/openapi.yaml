openapi: 3.1.0
info:
  title: 0dteTrader API
  version: 0.1.0
servers:
  - url: /v1
paths:
  /auth/register:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/AuthTokens' } } },
          }
        '409': { description: Email already registered }
  /auth/login:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/AuthTokens' } } },
          }
        '401': { description: Invalid credentials }
  /auth/refresh:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties: { refreshToken: { type: string } }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/AuthTokens' } } },
          }
        '401': { description: Invalid or expired refresh token }
  /auth/logout:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties: { refreshToken: { type: string } }
      responses:
        '204': { description: Logged out }
  /me:
    get:
      tags: [user]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } },
          }
    patch:
      tags: [user]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tradingMode: { type: string, enum: [live, practice] }
                tradingProvider: { type: string, enum: [webull, alpaca] }
      responses:
        '200':
          {
            description: Updated,
            content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } },
          }
  /me/webull-credentials:
    put:
      tags: [user]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebullCredentialsInput' }
      responses:
        '200': { description: Saved }
    delete:
      tags: [user]
      security: [{ bearerAuth: [] }]
      parameters:
        - {
            name: environment,
            in: query,
            schema: { type: string, enum: [live, practice], default: live },
          }
      responses:
        '204': { description: Deleted }
  /me/broker-credentials:
    put:
      tags: [user]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BrokerCredentialsInput' }
      responses:
        '200': { description: Saved }
    delete:
      tags: [user]
      security: [{ bearerAuth: [] }]
      parameters:
        - {
            name: provider,
            in: query,
            schema: { type: string, enum: [webull, alpaca], default: webull },
          }
        - {
            name: environment,
            in: query,
            schema: { type: string, enum: [live, practice], default: live },
          }
      responses:
        '204': { description: Deleted }
  /me/webull-session/refresh:
    post:
      tags: [user]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Fresh Webull access token minted for the caller's current trading mode
          content:
            application/json:
              schema:
                type: object
                required: [refreshed, environment]
                properties:
                  refreshed: { type: boolean, enum: [true] }
                  environment: { type: string, enum: [live, practice] }
  /market/quote:
    get:
      tags: [market]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: symbol, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/Quote' } } },
          }
  /market/candles:
    get:
      tags: [market]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: symbol, in: query, required: true, schema: { type: string } }
        - {
            name: interval,
            in: query,
            required: true,
            schema: { type: string, enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w] },
          }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: array, items: { $ref: '#/components/schemas/Candle' } } },
              },
          }
  /market/options-chain:
    get:
      tags: [market]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: symbol, in: query, required: true, schema: { type: string } }
        - { name: expiration, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/OptionsChain' } } },
          }
  /market/options-analytics:
    get:
      tags: [market]
      security: [{ bearerAuth: [] }]
      description: >-
        Fact-first options structure for one exact symbol/expiration. IV and
        Greeks are derived locally from validated two-sided quotes. Call/put
        gamma are unsigned magnitudes in USD delta change per 1% move; the
        optional call-minus-put dealer proxy is an explicit assumption, not
        observed inventory. Marked OI is not traded premium or flow. During an
        open regular session quotes have a 30-minute wall-clock age bound;
        outside regular hours only the final 30 minutes of the latest completed
        New York session are eligible and the response includes a warning.
      parameters:
        - { name: symbol, in: query, required: true, schema: { type: string } }
        - {
            name: expiration,
            in: query,
            required: true,
            schema: { type: string, format: date, description: 'Required exact-match expiration' },
          }
      responses:
        '200':
          {
            description: Complete,
            partial,
            or explicitly cached exact snapshot,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/OptionsAnalyticsSnapshot' } },
              },
          }
        '400': { description: Invalid symbol or malformed expiration }
        '404': { description: Exact expiration is not listed for the symbol }
        '503': { description: No usable fresh or bounded exact-key analytics are available }
  /orders/preview:
    post:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderRequest' }
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/OrderPreview' } } },
          }
  /orders:
    post:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderRequest' }
      responses:
        '200':
          {
            description: OK,
            content: { application/json: { schema: { $ref: '#/components/schemas/OrderResult' } } },
          }
        '403': { description: Trading disabled (kill switch) }
        '409': { description: An order with this idempotency key is already being placed }
    get:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: array, items: { $ref: '#/components/schemas/OrderResult' } } },
              },
          }
  /orders/history:
    get:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      description: Every order, newest first, with per-fill realized P/L (average-cost, multiplier-aware) and the net realized total.
      responses:
        '200':
          {
            description: OK,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/TradeHistory' } } },
          }
  /orders/{orderId}:
    delete:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Cancelled }
  /positions:
    get:
      tags: [trading]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { type: array, items: { $ref: '#/components/schemas/Position' } } },
              },
          }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
    Me:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        tradingDisabled: { type: boolean }
        tradingMode: { type: string, enum: [live, practice] }
        webullConfigured: { type: boolean, description: Live credentials stored }
        webullPracticeConfigured: { type: boolean, description: Practice credentials stored }
        webullAccountId:
          {
            type: string,
            nullable: true,
            description: Live account id auto-discovered via Webull account/list,
          }
        webullPracticeAccountId:
          {
            type: string,
            nullable: true,
            description: Practice account id auto-discovered via Webull account/list,
          }
        tradingProvider:
          { type: string, enum: [webull, alpaca], description: Active trading provider }
        alpacaConfigured:
          { type: boolean, nullable: true, description: Live Alpaca credentials stored }
        alpacaPracticeConfigured:
          { type: boolean, nullable: true, description: Practice Alpaca credentials stored }
        alpacaAccountId:
          {
            type: string,
            nullable: true,
            description: 'Alpaca v2 is key-scoped: no account id is stored',
          }
        alpacaPracticeAccountId: { type: string, nullable: true }
    WebullCredentialsInput:
      type: object
      required: [appKey, appSecret]
      properties:
        appKey: { type: string }
        appSecret: { type: string }
        accountId:
          {
            type: string,
            description: 'Optional manual override; normally auto-discovered via account/list',
          }
        environment: { type: string, enum: [live, practice], default: live }
    BrokerCredentialsInput:
      type: object
      required: [provider]
      properties:
        provider: { type: string, enum: [webull, alpaca] }
        appKey: { type: string, description: Webull app key (provider=webull) }
        appSecret: { type: string, description: Webull app secret (provider=webull) }
        apiKey: { type: string, description: Alpaca API key (provider=alpaca) }
        apiSecret: { type: string, description: Alpaca API secret (provider=alpaca) }
        environment: { type: string, enum: [live, practice], default: live }
    AlpacaCredentialsInput:
      type: object
      required: [provider, apiKey, apiSecret]
      properties:
        provider: { type: string, enum: [alpaca] }
        apiKey: { type: string }
        apiSecret: { type: string }
        environment: { type: string, enum: [live, practice], default: live }
    Quote:
      type: object
      properties:
        symbol: { type: string }
        bid: { type: number }
        ask: { type: number }
        last: { type: number }
        bidSize: { type: integer }
        askSize: { type: integer }
        volume: { type: integer }
        timestamp: { type: string, format: date-time }
    Candle:
      type: object
      properties:
        time: { type: string, format: date-time }
        open: { type: number }
        high: { type: number }
        low: { type: number }
        close: { type: number }
        volume: { type: integer }
    OptionContract:
      type: object
      properties:
        symbol: { type: string }
        underlying: { type: string }
        expiration: { type: string, format: date }
        strike: { type: number }
        optionType: { type: string, enum: [call, put] }
        bid: { type: number }
        ask: { type: number }
        last: { type: number }
    OptionsChain:
      type: object
      properties:
        underlying: { type: string }
        underlyingPrice: { type: number }
        expirations: { type: array, items: { type: string, format: date } }
        contracts: { type: array, items: { $ref: '#/components/schemas/OptionContract' } }
    OrderRequest:
      type: object
      required: [underlying, assetClass, side, quantity, orderType, selection]
      properties:
        underlying: { type: string }
        assetClass: { type: string, enum: [option] }
        side: { type: string, enum: [buy, sell] }
        quantity: { type: integer, minimum: 1 }
        orderType: { type: string, enum: [mid, market] }
        selection:
          type: object
          required: [mode]
          properties:
            mode: { type: string, enum: [auto_otm, explicit] }
            optionType: { type: string, enum: [call, put] }
            expiration: { type: string, format: date }
            strike: { type: number }
    OrderPreview:
      type: object
      properties:
        resolved:
          type: object
          properties:
            contractSymbol: { type: string }
            price: { type: number }
            estBuyingPower: { type: number }
        warnings: { type: array, items: { type: string } }
    OrderResult:
      type: object
      properties:
        orderId: { type: string }
        status: { type: string, enum: [submitted, filled, partially_filled, cancelled, rejected] }
        contractSymbol: { type: string }
        side: { type: string }
        quantity: { type: integer }
        orderType: { type: string }
        limitPrice: { type: number }
        filledPrice: { type: number }
        filledQuantity:
          {
            type: number,
            description: Broker-reported executed quantity (partial fills); absent when the broker gives only the order quantity,
          }
        timestamp: { type: string, format: date-time }
    TradeHistoryEntry:
      allOf:
        - $ref: '#/components/schemas/OrderResult'
        - type: object
          properties:
            realizedPnl:
              {
                type: [number, 'null'],
                description: Realized P/L for closing fills; null for opening fills and non-fills,
              }
    TradeHistory:
      type: object
      properties:
        entries:
          {
            type: array,
            items: { $ref: '#/components/schemas/TradeHistoryEntry' },
            description: Newest first,
          }
        totalRealizedPnl: { type: number }
    Position:
      type: object
      properties:
        symbol: { type: string }
        assetClass: { type: string }
        quantity: { type: integer }
        avgPrice: { type: number }
        markPrice: { type: number }
        unrealizedPnl: { type: number }
        multiplier:
          {
            type: number,
            description: 'Contract multiplier (options: 100) for client-side live P/L',
          }
    OptionsAnalyticsCoverage:
      type: object
      required: [contractsTotal, contractsIncluded, ratio]
      properties:
        contractsTotal: { type: integer, minimum: 0 }
        contractsIncluded: { type: integer, minimum: 0 }
        ratio: { type: number, minimum: 0, maximum: 1 }
    OptionsAnalyticsQuality:
      type: object
      required:
        [
          quoteAsOf,
          greeksAsOf,
          oiEffectiveDate,
          feedMode,
          coverage,
          status,
          warnings,
          calculationVersion,
          cacheStatus,
        ]
      properties:
        quoteAsOf: { type: [string, 'null'], format: date-time }
        greeksAsOf:
          {
            type: [string, 'null'],
            format: date-time,
            description: Conservative oldest quote time used by the locally derived Greeks; provider Greek timestamps remain diagnostic input provenance,
          }
        oiEffectiveDate: { type: [string, 'null'], format: date }
        feedMode: { type: string, enum: [realtime, delayed, sandbox, unknown] }
        coverage: { $ref: '#/components/schemas/OptionsAnalyticsCoverage' }
        status: { type: string, enum: [complete, partial] }
        warnings: { type: array, items: { type: string } }
        calculationVersion: { type: string }
        cacheStatus: { type: string, enum: [fresh, memory-cache, stale-fallback] }
    OptionsAnalyticsStrikeLeg:
      type: object
      required:
        [
          openInterest,
          volume,
          impliedVolatility,
          delta,
          gamma,
          gammaExposure,
          deltaNotional,
          markedOiValue,
          relativeSpread,
          roundTripCost,
          bidSize,
          askSize,
          multiplier,
        ]
      properties:
        openInterest: { type: integer, minimum: 0 }
        volume: { type: integer, minimum: 0 }
        impliedVolatility:
          {
            type: [number, 'null'],
            exclusiveMinimum: 0,
            description: Null when the quote cannot support local IV inversion,
          }
        delta: { type: [number, 'null'], minimum: -1, maximum: 1 }
        gamma: { type: [number, 'null'], minimum: 0 }
        gammaExposure:
          {
            type: [number, 'null'],
            minimum: 0,
            description: USD delta change per 1% underlying move; null when local Greeks are unavailable,
          }
        deltaNotional:
          {
            type: [number, 'null'],
            description: Long-holder delta notional; null when local Greeks are unavailable,
          }
        markedOiValue:
          {
            type: [number, 'null'],
            minimum: 0,
            description: OI times current mark times multiplier; not traded premium,
          }
        relativeSpread: { type: [number, 'null'], minimum: 0 }
        roundTripCost:
          {
            type: [number, 'null'],
            minimum: 0,
            description: Bid-ask spread times one contract multiplier,
          }
        bidSize: { type: integer, minimum: 0 }
        askSize: { type: integer, minimum: 0 }
        multiplier: { type: number, exclusiveMinimum: 0 }
    OptionsAnalyticsStrike:
      type: object
      required: [strike, call, put, grossGammaExposure, totalOpenInterest]
      properties:
        strike: { type: number, exclusiveMinimum: 0 }
        call:
          { oneOf: [{ $ref: '#/components/schemas/OptionsAnalyticsStrikeLeg' }, { type: 'null' }] }
        put:
          { oneOf: [{ $ref: '#/components/schemas/OptionsAnalyticsStrikeLeg' }, { type: 'null' }] }
        grossGammaExposure:
          {
            type: [number, 'null'],
            minimum: 0,
            description: Null only when no leg at the strike has locally modeled gamma,
          }
        totalOpenInterest: { type: integer, minimum: 0 }
    OptionsAnalyticsSnapshot:
      type: object
      required: [scope, exposureUnit, quality, structure, scenarios, impliedRange, strikes]
      properties:
        scope:
          type: object
          required:
            [
              symbol,
              rootSymbol,
              settlementStyle,
              expiration,
              observedAt,
              settlementAt,
              spot,
              forward,
            ]
          properties:
            symbol: { type: string, pattern: '^[A-Z0-9.-]{1,12}$' }
            rootSymbol:
              {
                type: string,
                minLength: 1,
                pattern: '^[A-Z0-9.-]+$',
                description: 'Exact option product/root modeled, for example SPX or SPXW',
              }
            settlementStyle:
              {
                type: string,
                enum: [am, pm],
                description: 'Opening-print or market-close settlement',
              }
            expiration: { type: string, format: date }
            observedAt: { type: string, format: date-time }
            settlementAt: { type: string, format: date-time }
            spot: { type: number, exclusiveMinimum: 0 }
            forward: { type: number, exclusiveMinimum: 0 }
        exposureUnit: { type: string, enum: ['$ delta change per 1% underlying move'] }
        quality: { $ref: '#/components/schemas/OptionsAnalyticsQuality' }
        structure:
          type: object
          required:
            [
              callGammaExposure,
              putGammaExposure,
              grossGammaExposure,
              callDeltaNotional,
              putDeltaNotional,
              callWall,
              putWall,
              grossGammaConcentration,
              maxOpenInterestStrike,
            ]
          properties:
            callGammaExposure:
              {
                type: [number, 'null'],
                minimum: 0,
                description: Null when no call leg has locally modeled gamma,
              }
            putGammaExposure:
              {
                type: [number, 'null'],
                minimum: 0,
                description: Null when no put leg has locally modeled gamma,
              }
            grossGammaExposure:
              {
                type: [number, 'null'],
                minimum: 0,
                description: Null when no leg has locally modeled gamma,
              }
            callDeltaNotional:
              {
                type: [number, 'null'],
                description: Null when no call leg has locally modeled delta,
              }
            putDeltaNotional:
              {
                type: [number, 'null'],
                description: Null when no put leg has locally modeled delta,
              }
            callWall: { type: [number, 'null'], exclusiveMinimum: 0 }
            putWall: { type: [number, 'null'], exclusiveMinimum: 0 }
            grossGammaConcentration: { type: [number, 'null'], minimum: 0, maximum: 1 }
            maxOpenInterestStrike: { type: [number, 'null'], exclusiveMinimum: 0 }
        scenarios:
          type: object
          required: [callPutDealerProxy]
          properties:
            callPutDealerProxy:
              oneOf:
                - type: object
                  required:
                    [
                      assumption,
                      gammaExposure,
                      deltaNotional,
                      strikeGammaExposures,
                      gammaRoots,
                      primaryGammaRoot,
                    ]
                  properties:
                    assumption: { type: string }
                    gammaExposure: { type: number }
                    deltaNotional: { type: number }
                    strikeGammaExposures:
                      type: array
                      description: 'Strictly ascending per-strike call-minus-put scenario values; not observed dealer inventory'
                      items:
                        type: object
                        required: [strike, gammaExposure]
                        properties:
                          strike: { type: number, exclusiveMinimum: 0 }
                          gammaExposure:
                            {
                              type: [number, 'null'],
                              description: Null when neither observed leg has locally modeled gamma,
                            }
                    gammaRoots:
                      {
                        type: array,
                        items: { type: number, exclusiveMinimum: 0 },
                        description: 'Strictly ascending unique roots',
                      }
                    primaryGammaRoot:
                      {
                        type: [number, 'null'],
                        exclusiveMinimum: 0,
                        description: 'When present, a member of gammaRoots nearest scope.spot',
                      }
                - { type: 'null' }
        impliedRange:
          oneOf:
            - type: object
              required: [lower, upper, confidence, label, atmIv, straddleLower, straddleUpper]
              properties:
                lower: { type: number, minimum: 0 }
                upper: { type: number, exclusiveMinimum: 0 }
                confidence: { type: number, enum: [0.68] }
                label: { type: string, enum: ['model-implied 68% range'] }
                atmIv: { type: number, exclusiveMinimum: 0 }
                straddleLower: { type: number, minimum: 0 }
                straddleUpper: { type: number, exclusiveMinimum: 0 }
            - { type: 'null' }
        strikes: { type: array, items: { $ref: '#/components/schemas/OptionsAnalyticsStrike' } }
