objective:
  restated:
    - Correct gamma and delta formulas, signs, units, multipliers, settlement, and freshness.
    - Replace misleading premium heat with marked-OI value and liquidity layers.
    - Make call, put, and gross observed structure the default and dealer scenarios explicit and optional.
    - Add implied range, straddle breakevens, independent walls, and robust roots.
    - Persist minute snapshots for core plus viewed symbols with compaction and retention.
    - Keep desktop and iOS terminology, defaults, provenance, accessibility, and cancellation aligned.
    - Remove the obsolete GEX endpoint and dead compatibility code.
    - Pass strict types, lint, format, builds, tests, and checking-plan review.
plan_intake:
  user_messages:
    - timestamp_utc: '2026-07-19'
      message: Implement the approved Options Analytics Snapshot Integrity Suite end to end.
  agent_questions_and_user_answers:
    - q_id: Q1
      agent_question: Which suite shape should be implemented?
      provided_options: [snapshot-suite, minimal-correction, flow-first]
      user_answer: snapshot-suite
      impact_on_plan: Includes calculation, storage, and paired clients now.
    - q_id: Q2
      agent_question: What should the default chart assert?
      provided_options: [structure-first, conventional-dealer-proxy]
      user_answer: structure-first
      impact_on_plan: Observed call/put/gross values default on; proxy defaults off.
    - q_id: Q3
      agent_question: Persist point-in-time history now?
      provided_options: [yes, later]
      user_answer: yes
      impact_on_plan: Adds Prisma record, capture, compaction, and retention.
  locked_assumptions_and_constraints:
    - Exact requested expiration only; never substitute.
    - Core capture symbols are SPY, QQQ, IWM, and SPX plus the actively viewed key.
    - One-minute detail retains 30 days and five-minute compact data retains one year.
    - No public history endpoint in this version.
    - No compatibility shim or dead GEX naming.
