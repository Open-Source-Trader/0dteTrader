pre_plan_artifact_requirements:
  mandatory_before_plan_authoring: true
  discovery_result: No existing options-analytics spec, flow chart, or logic map existed.
  artifacts:
    - docs/specs/2026-07-19-options-analytics-spec.md
    - docs/flow-charts/2026-07-19-options-analytics-flow-chart.yaml
    - docs/logic-maps/2026-07-19-options-analytics-logic-map.yaml
request_breakdown:
  requests:
    - request: Correct calculation and provider truthfulness.
      purpose: This exists to prevent materially wrong exposure levels so that traders can interpret the chart safely.
    - request: Add honest high-value indicators.
      purpose: This exists to expose range, structure, OI value, and liquidity so that the chart supports actual options decisions.
    - request: Persist and render point-in-time snapshots.
      purpose: This exists to make calculations replayable and visible without implying present data existed historically.
    - request: Migrate both clients and docs.
      purpose: This exists to eliminate contract and terminology drift so that every surface communicates the same model.
self_questioning_and_solution_selection:
  required: true
  guiding_questions:
    - What can be observed versus only assumed from OI?
    - What units and timestamps let a user independently interpret every value?
    - What partial data can remain useful without fabrication?
    - What capture rate is useful without causing provider overload?
  brainstorm_candidate_solutions:
    min_options: 3
    options:
      - option_id: O1
        summary: Patch only current formulas and labels.
        tradeoffs:
          { pros: [smallest change], cons: [no quality contract, no history, limited value] }
      - option_id: O2
        summary: Build signed trade-flow infrastructure first.
        tradeoffs:
          {
            pros: [future flagship signal],
            cons: [requires unavailable streamed classification and larger scope],
          }
      - option_id: O3
        summary: Build a fact-first quality-aware snapshot suite.
        tradeoffs:
          {
            pros: [accurate now, replayable, supports useful indicators],
            cons: [breaking coordinated migration],
          }
  selected_solution:
    option_id: O3
    why_best: Delivers the most reliable currently observable product while leaving signed flow for a correctly sourced later version.
spec_sheet:
  current_state: GEX-specific duplicated contracts use silent assumptions, misleading names, and present-time full-width rendering.
  target_state: One canonical options-analytics contract separates facts, models, quality, capture, and presentation.
  source: docs/specs/2026-07-19-options-analytics-spec.md
flow_description:
  required_format: inputs -> transformations -> outputs -> side effects
  mapping: symbol/expiration/quote/chain/clock -> validation/settlement/forward/IV/Greeks/aggregation -> quality-aware snapshot/client profile -> exact cache/snapshot write/logs/metrics
  current_logic_flow: docs/flow-charts/2026-07-19-options-analytics-flow-chart.yaml#current_flow
  new_logic_flow: docs/flow-charts/2026-07-19-options-analytics-flow-chart.yaml#target_flow
invariants:
  preconditions: [exact key, explicit settlement, validated source fields]
  postconditions: [finite outputs, explicit units and provenance, paired client parity]
  must_never_happen:
    [
      wrong expiration,
      silent IV,
      dealer-fact claim,
      premium-flow mislabel,
      unbounded cache,
      obsolete response overwrite,
    ]
