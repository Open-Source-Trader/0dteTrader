findings:
  - id: PERF-001
    severity: P1
    description: The first closed-session remediation recomputed New York session and settlement state for each quote, Greek, and last-trade timestamp in every contract.
    file: apps/api/src/options-analytics/tradier.client.ts
    reproduction_steps: Normalize a large option chain outside regular hours and count Intl.DateTimeFormat/session-calendar evaluation calls.
    impact: A thousand-contract chain could perform thousands of redundant timezone/calendar transformations on every interactive poll and scheduled capture.
    suggested_fix: Derive one immutable source timestamp policy per underlying quote response and one per chain response, then reuse it for every timestamp decision and warning.
    blocker: true
    remediation_status: resolved
    remediation_evidence: getQuote and getChain now each construct sourceTimestampPolicy once; the provider suite passes 19 of 19 and API strict lint/build pass after the refactor.
  - id: PROVIDER-003
    severity: P1
    description: Tradier quote normalization applies the same 30-minute wall-clock freshness cutoff during regular trading and closed-market periods, so Friday's valid closing snapshot is unconditionally rejected on Sunday night.
    file: apps/api/src/options-analytics/tradier.client.ts
    reproduction_steps: At 2026-07-20T01:43Z request AAPL with a finite synchronized Tradier quote timestamped in the final minute of the Friday 2026-07-17 regular session.
    impact: The exact options snapshot returns 503 outside a 30-minute window after every close, leaving all chart options layers empty even when the latest completed-session structure is useful and can be clearly aged.
    suggested_fix: Keep strict wall-clock freshness while the regular session is open; outside it accept only timestamps from the latest completed regular session, retain future/skew/spread checks, and add an explicit prior-session warning.
    blocker: true
    remediation_status: resolved
    remediation_evidence: Three expected RED failures became 19 passing provider tests; prior-session acceptance is bounded to the final 30 minutes of the latest completed regular session and covers Sunday, Monday premarket/postmarket, an older Thursday, an early same-session quote, and numeric-string epochs.
  - id: CLIENT-003
    severity: P1
    description: The breaking Options Structure migration defaults its master chart setting off on both clients and intentionally ignores the deleted GEX settings key, so users who previously viewed GEX receive no replacement overlay.
    file: apps/desktop/src/features/chart/optionsAnalytics/optionsAnalyticsSettings.ts
    reproduction_steps: Launch either client with no optionsAnalytics.v1 settings after upgrading from the removed GEX implementation.
    impact: Valid implied range, fact-first gamma profile, and independent call/put walls are fetched in shadow mode but not rendered, which looks like the feature was removed.
    suggested_fix: Enable the fact-first master layer by default on desktop and iOS while keeping marked OI, liquidity, and the dealer-position gamma-root proxy off until explicitly selected.
    blocker: true
    remediation_status: resolved
    remediation_evidence: The desktop RED became 5 passing settings/control tests, desktop presentation/overlay passes 14 focused tests, and iOS settings/presentation passes 15 focused tests. The default enables only implied range and gamma profile, while marked OI, liquidity, and dealer proxy remain false.
  - id: AUTH-001
    severity: P2
    description: Webull is returning UNAUTHORIZED for the configured application credentials and the live-stream gateway cannot recover without a valid key/secret plus Webull OpenAPI approval.
    file: external Webull account configuration
    reproduction_steps: Connect the reported user credential set and request AAPL or AAPL260724C00335000 stream quotes.
    impact: Live Webull chart/contract ticks fail independently of the Tradier options-analytics snapshot.
    suggested_fix: Re-enter the matching environment's Webull app key and secret, approve the OpenAPI notification in Webull, then reconnect from Profile.
    blocker: false
    remediation_status: external-user-action-required
  - id: INTEGRATION-001
    severity: P1
    description: Main's newly added AI Analysis path referenced the deleted GexLevels contract and described inferred positioning as options flow after the breaking Options Analytics migration.
    file: apps/ios/0dteTrader/Features/AIAnalysis/AIAnalysisModels.swift
    reproduction_steps: Merge main at ce01d41 into the feature branch and compile the AI Analysis snapshot and prompt construction against the breaking shared contract.
    impact: The merged iOS client would not compile against the deleted type, and preserving the old prompt would present OI-based positioning assumptions as observed flow.
    suggested_fix: Pass the exact OptionsAnalyticsSnapshotDTO into AI Analysis, summarize observed call/put/gross structure and quality first, and include dealer positioning only under its explicit scenario name and assumption text.
    blocker: true
    remediation_status: resolved
    remediation_evidence: The merged model compiles with the new DTO, the focused six-suite iOS run passes 44 of 44, SwiftLint reports 0 violations, and production GEX residue scanning finds only the deliberate old-endpoint rejection test.
  - id: PARTIAL-002
    severity: P1
    description: The engine still threw when every quote-valid contract lacked a solvable local IV, so an all-observed snapshot could not return valid OI, volume, sizes, marked-OI value, or liquidity.
    file: apps/api/src/options-analytics/options-analytics.engine.ts
    reproduction_steps: Provide a synchronized two-sided call/put pair whose quote mids support a forward but whose prices have no admissible IV, then compute the snapshot.
    impact: Valid observed layers become unavailable solely because every modeled layer is unavailable; zero-valued modeled totals would also fabricate data if used as a workaround.
    suggested_fix: Permit zero modeled legs, make modeled structure totals nullable per side, return a null scenario and range, retain observed strikes and max-OI, and enforce the contract in both clients and source-of-truth docs.
    blocker: true
    remediation_status: resolved
    remediation_evidence: Engine RED threw for zero modeled contracts; GREEN passes 25 tests and returns null modeled totals with observed layers. Desktop validation/presentation passes 53 tests, focused iOS validation/presentation exits 0 with 0 SwiftLint violations, and source-of-truth docs describe the same contract.
  - id: TEST-002
    severity: P2
    description: The credential e2e test decoded random AES-GCM bytes as UTF-8 and rejected any ciphertext that happened to contain the two-character strings used as test secrets.
    file: apps/api/test/app.e2e-spec.ts
    reproduction_steps: Run the complete API suite until random ciphertext contains the byte sequence for ak or sk.
    impact: A secure credential write can fail the verification gate nondeterministically even though no plaintext is stored or returned.
    suggested_fix: Assert the exact GCM envelope size and binary non-equality with the corresponding plaintext instead of searching arbitrary ciphertext as text.
    blocker: false
    remediation_status: resolved
    remediation_evidence: The initial full API run failed only this assertion; the unchanged production path passes a fresh full run of 21 suites and 267 tests after the deterministic test correction.
  - id: TEST-003
    severity: P2
    description: One engine golden-vector test still performed arithmetic on modeled structure totals after the contract correctly made those totals nullable for observed-only snapshots.
    file: apps/api/src/options-analytics/options-analytics.engine.spec.ts
    reproduction_steps: Run the full API suite under strict TypeScript after widening the modeled structure fields to number or null.
    impact: The test suite failed to compile even though the fixture intentionally supplies modelable call and put legs.
    suggested_fix: Prove all four fixture totals are non-null at the test boundary before performing the aggregation assertions.
    blocker: false
    remediation_status: resolved
    remediation_evidence: The expected strict compile failure was followed by a fresh passing API run of 21 suites and 268 tests after adding an explicit fixture invariant guard.
  - id: PARTIAL-001
    severity: P1
    description: The engine initially discarded an otherwise valid contract when local IV could not be solved, removing usable OI, volume, quote-size, marked-OI-value, and liquidity data together with unavailable modeled Greeks.
    file: apps/api/src/options-analytics/options-analytics.engine.ts
    reproduction_steps: Supply a valid two-sided quote and observed fields whose midpoint has no admissible local IV, then inspect the strike layer.
    impact: One invalid modeled layer unnecessarily reduced every observed layer and contradicted the quality contract that valid layers remain usable.
    suggested_fix: Retain an observed-only strike leg, make all model-dependent fields atomically nullable, compute modeled structure from modeled legs only, and enforce the same contract in OpenAPI, fixtures, TypeScript, and Swift.
    blocker: true
    remediation_status: resolved
    remediation_evidence: Targeted engine suite passed 24 tests after an expected RED; desktop full suite passed 120 tests and build; focused iOS contract, validation, and presentation xcodebuild exits 0 with 0 SwiftLint violations.
  - id: CONTRACT-001
    severity: P1
    description: The initial canonical strike row exposed callPutDealerProxyExposure beside observed call/put/gross facts even though signed dealer positioning belongs only to an explicitly named scenario.
    file: packages/shared-types/src/index.ts
    reproduction_steps: Inspect OptionsAnalyticsStrike or the canonical fixture and find the signed call-minus-put field outside scenarios.callPutDealerProxy.
    impact: A consumer can treat a positioning assumption as part of the observed strike structure, contradicting the approved fact-first contract.
    suggested_fix: Remove the field with no shim and place sorted per-strike scenario values under scenarios.callPutDealerProxy.strikeGammaExposures across backend, OpenAPI, desktop, iOS, and fixtures.
    blocker: true
    remediation_status: resolved
    remediation_evidence: Backend RED failed on the legacy fact field and missing scenario array; GREEN passed 26 tests. Desktop focused contract/presentation tests passed 53 of 53 and iOS contract/validation/presentation xcodebuild passed with zero SwiftLint violations.
  - id: IOS-005
    severity: P1
    description: The first five-input iOS liquidity ranking allowed metrics with identical values at every strike to saturate the importance score, hiding a distinct high-volume or high-slippage strike.
    file: apps/ios/0dteTrader/Features/Chart/OptionsAnalytics/OptionsAnalyticsPresentation.swift
    reproduction_steps: Enable gamma and liquidity with two high-gamma strikes and a low-gamma high-volume strike while quote size and OI are equal across all three.
    impact: A decision-relevant liquidity or slippage outlier can be omitted from the bounded right-edge profile.
    suggested_fix: Normalize each liquidity input over its full-snapshot observed range, give constant metrics zero ranking weight, and select the strongest enabled-layer score.
    blocker: true
    remediation_status: resolved
    remediation_evidence: Focused RED reproduced selection of strikes 580 and 581 instead of 580 and 583; GREEN passed both mixed-layer and five-independent-metric xcodebuild cases with SwiftLint reporting zero violations.
  - id: TEST-001
    severity: P2
    description: The nearest-plus-exact backend concurrency test waited on setImmediate while Jest fake timers were active, causing a deterministic 30-second timeout unrelated to the service promise graph.
    file: apps/api/src/options-analytics/options-analytics.service.spec.ts
    reproduction_steps: Run the full API Jest suite with fake timers enabled in OptionsAnalyticsService exact cache.
    impact: The full backend gate falsely reports a deadlock and delays useful concurrency feedback.
    suggested_fix: Synchronize on an explicit chain-start promise before releasing the provider gate.
    blocker: false
    remediation_status: resolved
    remediation_evidence: Targeted service suite passes 16 of 16 in 0.747 seconds, including exact and nearest-plus-exact in-flight deduplication.
  - id: DESKTOP-005
    severity: P1
    description: Desktop marked-OI bar normalization used only currently visible strikes, so bar widths changed when the user panned or zoomed.
    file: apps/desktop/src/features/chart/optionsAnalytics/OptionsAnalyticsOverlay.tsx
